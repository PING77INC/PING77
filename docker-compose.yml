version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: ping77-postgres
    environment:
      POSTGRES_USER: ping77
      POSTGRES_PASSWORD: ping77
      POSTGRES_DB: ping77
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ping77"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ping77-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  redis_data:
